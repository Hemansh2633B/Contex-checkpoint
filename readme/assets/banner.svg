<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Main background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Glow blob -->
  <ellipse cx="200" cy="100" rx="180" ry="80" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#21262d" stroke-width="1" opacity="0.6">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>

  <!-- Border -->
  <rect width="900" height="200" fill="none" stroke="url(#accent)" stroke-width="1.5" rx="12" opacity="0.5"/>

  <!-- Left icon block - save symbol -->
  <g transform="translate(52, 80)">
    <rect x="-22" y="-22" width="44" height="44" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <!-- Floppy disk icon -->
    <rect x="-12" y="-14" width="24" height="28" rx="2" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <rect x="-8" y="-14" width="12" height="8" rx="1" fill="#58a6ff" opacity="0.6"/>
    <rect x="-7" y="2" width="14" height="10" rx="1" fill="none" stroke="#58a6ff" stroke-width="1.2"/>
    <circle cx="2" cy="7" r="2" fill="#58a6ff" opacity="0.8"/>
  </g>

  <!-- Accent top-left bar -->
  <rect x="12" y="12" width="60" height="2" rx="1" fill="url(#accent)" opacity="0.7"/>

  <!-- Main title -->
  <text x="100" y="78" font-size="38" font-weight="700" fill="#e6edf3" letter-spacing="-1" font-family="'Courier New', monospace">context-checkpoint</text>

  <!-- Gradient underline -->
  <rect x="100" y="86" width="520" height="2" rx="1" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="101" y="115" font-size="13.5" fill="#8b949e" letter-spacing="0.5" font-family="'Courier New', monospace">Save · Compress · Version · Encrypt · Resume AI Sessions Across Windows &amp; Models</text>

  <!-- Tag pills -->
  <g transform="translate(101, 132)">
    <!-- v2.0 -->
    <rect width="46" height="20" rx="10" fill="#1f6feb" opacity="0.25"/>
    <rect width="46" height="20" rx="10" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.6"/>
    <text x="23" y="14" font-size="10" fill="#58a6ff" text-anchor="middle" font-family="'Courier New', monospace">v 2.0</text>

    <!-- agentskills -->
    <rect x="54" width="90" height="20" rx="10" fill="#238636" opacity="0.2"/>
    <rect x="54" width="90" height="20" rx="10" fill="none" stroke="#238636" stroke-width="1" opacity="0.5"/>
    <text x="99" y="14" font-size="10" fill="#3fb950" text-anchor="middle" font-family="'Courier New', monospace">agentskills.io</text>

    <!-- cross-model -->
    <rect x="152" width="96" height="20" rx="10" fill="#6e40c9" opacity="0.2"/>
    <rect x="152" width="96" height="20" rx="10" fill="none" stroke="#6e40c9" stroke-width="1" opacity="0.5"/>
    <text x="200" y="14" font-size="10" fill="#a371f7" text-anchor="middle" font-family="'Courier New', monospace">cross-model</text>

    <!-- encrypted -->
    <rect x="256" width="76" height="20" rx="10" fill="#b08800" opacity="0.2"/>
    <rect x="256" width="76" height="20" rx="10" fill="none" stroke="#b08800" stroke-width="1" opacity="0.5"/>
    <text x="294" y="14" font-size="10" fill="#e3b341" text-anchor="middle" font-family="'Courier New', monospace">encrypted</text>
  </g>

  <!-- Right side — token bar visual -->
  <g transform="translate(700, 60)">
    <text x="0" y="0" font-size="10" fill="#8b949e" font-family="'Courier New', monospace">CONTEXT HEALTH</text>
    <!-- Bar background -->
    <rect x="0" y="8" width="170" height="10" rx="5" fill="#21262d"/>
    <!-- Bar fill -->
    <rect x="0" y="8" width="145" height="10" rx="5" fill="url(#accent)" opacity="0.85"/>
    <text x="0" y="34" font-size="10" fill="#58a6ff" font-family="'Courier New', monospace">7,200 / 8,192 tokens</text>
    <text x="0" y="50" font-size="10" fill="#e3b341" font-family="'Courier New', monospace">⚡ 88% — save now</text>
    <!-- /save command hint -->
    <rect x="0" y="60" width="80" height="18" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="8" y="73" font-size="10" fill="#3fb950" font-family="'Courier New', monospace">/save</text>
    <rect x="88" y="60" width="80" height="18" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="96" y="73" font-size="10" fill="#a371f7" font-family="'Courier New', monospace">/resume</text>
  </g>

  <!-- Bottom-right version mark -->
  <text x="878" y="188" font-size="9" fill="#30363d" text-anchor="end" font-family="'Courier New', monospace">context-checkpoint v2.0</text>
</svg>
